<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">LifeKraft</title>
  <desc id="desc">Wordmark with coral medallion containing white lowercase 'lk' and olive-green wordmark.</desc>

  <defs>
    <!-- Soft warm background, transparent in raw asset; canvas only for preview -->
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6B0A8"/>
      <stop offset="1" stop-color="#EE8E81"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#94A36A"/>
      <stop offset="1" stop-color="#788851"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Preview background (warm grey). Remove this rect for transparent export. -->
  <rect width="720" height="220" rx="24" fill="#F4F1EA"/>

  <!-- Medallion -->
  <g filter="url(#softShadow)" transform="translate(110 110)">
    <circle r="72" fill="url(#coral)"/>
    <!-- Subtle inner highlight -->
    <ellipse cx="-22" cy="-26" rx="32" ry="18" fill="#FFFFFF" opacity="0.18"/>
    <!-- 'lk' wordmark inside medallion -->
    <g fill="#FFFFFF" font-family="'Plus Jakarta Sans', 'Outfit', 'Inter', system-ui, sans-serif" font-weight="700">
      <text x="0" y="22" text-anchor="middle" font-size="78" letter-spacing="-2">lk</text>
    </g>
    <!-- Small leaf accent for warmth (the dot of 'i' moved out as a sprout) -->
    <path d="M 30 -42 q 8 -12 22 -8 q -2 14 -14 18 q -10 2 -8 -10 z" fill="url(#olive)"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Plus Jakarta Sans', 'Outfit', 'Inter', system-ui, sans-serif" font-weight="700" font-size="76" letter-spacing="-2">
    <text x="225" y="128" fill="#EE8E81">Life</text>
    <text x="378" y="128" fill="#788851">Kraft</text>
  </g>

  <!-- Tagline -->
  <text x="225" y="170" font-family="'Plus Jakarta Sans', system-ui, sans-serif"
        font-size="22" font-weight="500" letter-spacing="2" fill="#7A6E5A">
    CODZIENNIE  POD  RĘKĄ
  </text>
</svg>
